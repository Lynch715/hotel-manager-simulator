<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#171b1f">
<link rel="icon" href="data:,">
<title>雾都宾馆 · 总经理的两年</title>
<style>
:root{
  --bg:#171b1f;--panel:#20262b;--panel2:#282f35;--panel3:#30383f;--line:#3b454d;
  --text:#f0eee7;--muted:#a6adb1;--gold:#e2b95b;--green:#65bd8a;--red:#e4776b;
  --blue:#71a9d2;--cyan:#67b8ba;--shadow:rgba(0,0,0,.28)
}
*{box-sizing:border-box;margin:0;padding:0;letter-spacing:0}
html{background:var(--bg)}
body{background:var(--bg);color:var(--text);font-family:"PingFang SC","Microsoft YaHei",system-ui,sans-serif;font-size:15px;line-height:1.55;min-height:100vh}
button,input{font:inherit}
button{border:1px solid var(--line);background:var(--panel2);color:var(--text);border-radius:7px;padding:8px 12px;cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
button:hover{border-color:var(--gold);color:var(--gold)}
button:disabled{opacity:.35;cursor:not-allowed}
button:disabled:hover{border-color:var(--line);color:var(--text)}
button.primary{background:var(--gold);border-color:var(--gold);color:#1c1b17;font-weight:700}
button.danger{border-color:#754b49;color:#efaaa4}
button.icon{width:36px;height:36px;padding:0;display:inline-grid;place-items:center;font-size:18px}
button.small{padding:6px 9px;font-size:13px}
.app{max-width:980px;margin:0 auto;padding:10px 10px calc(72px + env(safe-area-inset-bottom))}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:4px 2px 7px}
.brand{display:flex;align-items:center;gap:9px;min-width:0}
.seal{width:37px;height:37px;border:1px solid var(--gold);display:grid;place-items:center;color:var(--gold);font-family:serif;font-weight:700;font-size:19px;background:#26261f;flex:0 0 auto}
.brand h1{font-size:18px;color:var(--gold);white-space:nowrap}
.brand p{font-size:11px;color:var(--muted);white-space:nowrap}
.datebox{text-align:right;font-size:12px;color:var(--muted);white-space:nowrap}
.datebox b{color:var(--text);font-size:14px}
.top-actions{display:flex;align-items:center;gap:6px}
.stats{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:5px;margin-bottom:7px}
.stat{position:relative;text-align:center;background:var(--panel);border:1px solid var(--line);border-radius:7px;padding:6px 3px;min-width:0;cursor:help}
.stat .label{font-size:11px;color:var(--muted)}
.stat .value{font-size:16px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stat .value small{font-size:10px;font-weight:400;color:var(--muted)}
.stat .delta{height:13px;font-size:10px}
.stat .tip{display:none;position:absolute;z-index:30;top:103%;left:50%;transform:translateX(-50%);width:210px;background:#101417;border:1px solid var(--line);border-radius:7px;padding:8px;text-align:left;color:var(--muted);font-size:12px;box-shadow:0 8px 24px var(--shadow)}
.stat:hover .tip,.stat.tip-on .tip{display:block}
.up{color:var(--green)}.down{color:var(--red)}.gold{color:var(--gold)}.blue{color:var(--blue)}
.forecast{background:var(--panel);border:1px solid var(--line);border-radius:7px;padding:7px 10px;margin-bottom:7px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;font-size:12px;color:var(--muted)}
.forecast b{color:var(--text)}
.forecast .warning{color:var(--gold)}
.pricing{background:var(--panel);border:1px solid var(--line);border-radius:7px;padding:8px 10px;margin-bottom:7px}
.section-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:6px}
.section-head h2{font-size:14px;color:var(--text)}
.section-head span{font-size:11px;color:var(--muted)}
.price-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.price-row{display:grid;grid-template-columns:1fr auto;align-items:center;gap:6px;background:#191e22;border:1px solid #333c43;border-radius:6px;padding:6px 7px}
.price-row .name{font-size:12px;color:var(--muted)}
.price-row .price{font-size:15px;font-weight:700}
.stepper{display:flex;gap:3px;align-items:center}
.stepper button{width:30px;height:30px;padding:0;font-size:18px;display:grid;place-items:center}
.energy{display:flex;align-items:center;gap:9px;background:var(--panel);border:1px solid var(--line);border-radius:7px;padding:7px 10px;margin-bottom:7px}
.energy-dots{color:var(--gold);font-size:16px;white-space:nowrap}
.energy .hint{font-size:12px;color:var(--muted);flex:1}
.actions{display:grid;grid-template-columns:repeat(6,1fr);gap:5px;margin-bottom:7px}
.action{background:var(--panel);border:1px solid var(--line);border-radius:7px;padding:8px 3px;text-align:center;cursor:pointer;user-select:none;min-width:0;touch-action:manipulation}
.action:hover{border-color:var(--gold)}
.action.off{opacity:.35;pointer-events:none}
.action .glyph{font-size:20px;line-height:1.1}
.action .name{font-size:13px;font-weight:700;margin-top:3px}
.action .desc{font-size:10px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tabs{display:flex;gap:3px;margin-top:2px}
.tabs button{flex:1;border-radius:7px 7px 0 0;border-bottom:0;padding:7px 2px;font-size:13px;min-width:0}
.tabs button.on{background:var(--panel);border-color:var(--gold);color:var(--gold)}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:0 7px 7px 7px;padding:10px;min-height:330px}
.subnav{display:flex;gap:5px;overflow-x:auto;padding-bottom:7px;margin-bottom:7px;border-bottom:1px solid var(--line);scrollbar-width:none}
.subnav::-webkit-scrollbar{display:none}
.subnav button{padding:5px 10px;font-size:12px;white-space:nowrap}
.subnav button.on{color:var(--gold);border-color:var(--gold);background:#2d2d27}
.card{background:var(--panel2);border:1px solid var(--line);border-radius:7px;padding:9px 10px;margin-bottom:7px}
.card:last-child{margin-bottom:0}
.row{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.card h3{font-size:14px;display:inline}
.card .meta{font-size:11px;color:var(--muted)}
.card .copy{font-size:12px;color:var(--muted);margin-top:4px}
.card .number{font-size:13px;color:var(--muted);white-space:nowrap}
.card .number b{color:var(--text)}
.card-actions{display:flex;gap:5px;flex-wrap:wrap;margin-top:7px}
.pill{display:inline-block;border:1px solid var(--line);border-radius:999px;padding:1px 7px;font-size:10px;color:var(--muted);vertical-align:1px;margin-left:4px}
.pill.gold{border-color:#725f32;color:var(--gold)}
.pill.green{border-color:#365f49;color:#83d3a2}
.pill.red{border-color:#70433f;color:#ee9a92}
.pill.blue{border-color:#3b5870;color:#8bbce0}
.progress{height:6px;background:#151a1d;border-radius:3px;overflow:hidden;margin-top:5px}
.progress i{display:block;height:100%;background:var(--blue);border-radius:3px}
.metric-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:8px}
.metric{background:#191e22;border:1px solid #333c43;border-radius:6px;padding:7px;text-align:center}
.metric .v{font-size:15px;font-weight:700;color:var(--gold)}
.metric .k{font-size:10px;color:var(--muted)}
.room-table,.rank-table{width:100%;border-collapse:collapse;font-size:12px}
.room-table th,.room-table td,.rank-table th,.rank-table td{padding:6px 5px;border-bottom:1px solid var(--line);text-align:left}
.room-table th,.rank-table th{font-weight:400;color:var(--muted);font-size:11px}
.rank-table tr.me{background:#343225;color:var(--gold);font-weight:700}
.order-card.accepted{border-color:#3f7053;background:#26352d}
.order-card.rejected{opacity:.5}
.order-type{color:var(--cyan);font-size:11px;font-weight:700}
.load{font-size:11px;color:var(--muted)}
.load.high{color:var(--red)}
.vacancy{border-style:dashed;background:#20262b}
.person-head{display:flex;align-items:flex-start;gap:8px}
.avatar{width:34px;height:34px;background:#394149;border:1px solid #59636b;display:grid;place-items:center;font-weight:700;color:var(--gold);flex:0 0 auto}
.person-main{min-width:0;flex:1}
.attrs{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
.attr{font-size:10px;padding:1px 6px;border-radius:999px;background:#1a2024;color:var(--muted);border:1px solid #39434a}
.empty-state{text-align:center;color:var(--muted);padding:30px 10px;font-size:13px}
.log{max-height:460px;overflow-y:auto;font-size:12px}
.log p{padding:5px 2px;border-bottom:1px dashed #364047;color:var(--muted)}
.log p.good{color:var(--green)}.log p.bad{color:var(--red)}.log p.month{color:var(--gold);font-weight:700}
.mask{position:fixed;inset:0;background:rgba(7,9,10,.82);display:none;align-items:center;justify-content:center;padding:14px;z-index:50}
.mask.show{display:flex}
.modal{width:100%;max-width:570px;max-height:88vh;overflow-y:auto;background:var(--panel);border:1px solid var(--gold);border-radius:9px;padding:17px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.modal h2{font-size:17px;color:var(--gold);margin-bottom:7px}
.modal-body{font-size:14px;white-space:pre-line;color:var(--text);margin-bottom:12px}
.modal-options{display:flex;flex-direction:column;gap:7px}
.modal-options button{text-align:left;padding:10px 12px;line-height:1.4}
.modal-options button small{display:block;color:var(--muted);font-size:11px;margin-top:2px}
.report-line{display:flex;justify-content:space-between;gap:10px;border-bottom:1px dashed #3a444b;padding:4px 0;font-size:12px}
.report-line span:last-child{font-weight:700;text-align:right}
.ending{position:fixed;inset:0;z-index:60;background:rgba(9,11,12,.95);display:none;align-items:flex-start;justify-content:center;overflow-y:auto;padding:18px}
.ending.show{display:flex}
.end-card{width:100%;max-width:560px;background:#22282d;border:2px solid var(--gold);border-radius:9px;padding:22px 18px;text-align:center;margin:auto}
.end-card .eyebrow{font-size:11px;color:var(--muted)}
.end-card h2{font-size:25px;color:var(--gold);margin:7px 0}
.end-card .story{text-align:left;white-space:pre-line;font-size:13px;line-height:1.7;margin:12px 0}
.badges{display:flex;gap:5px;justify-content:center;flex-wrap:wrap;margin:10px 0}
.badge{border:1px solid #6f5c31;color:var(--gold);border-radius:999px;padding:2px 8px;font-size:11px}
#nameInput{width:100%;background:#14191c;color:var(--text);border:1px solid var(--line);border-radius:7px;padding:9px;font-size:15px}
@media(max-width:700px){
  .app{padding:7px 7px calc(58px + env(safe-area-inset-bottom))}
  .brand h1{font-size:16px}.brand p{display:none}.seal{width:32px;height:32px;font-size:17px}
  .datebox{font-size:10px}.datebox b{font-size:12px}
  .stats{grid-template-columns:repeat(3,1fr)}.stat .value{font-size:15px}
  .stat .tip{position:fixed;top:auto;bottom:12px;left:10px;right:10px;width:auto;transform:none}
  .price-grid{grid-template-columns:1fr}.price-row{grid-template-columns:1fr auto}
  .pricing.compact .price-grid{grid-template-columns:repeat(3,1fr)}
  .pricing.compact .price-row{grid-template-columns:1fr;gap:2px}.pricing.compact .stepper{justify-content:space-between}
  .actions{grid-template-columns:repeat(3,1fr)}
  .energy .hint{display:none}.panel{padding:8px}.metric-grid{grid-template-columns:repeat(2,1fr)}
  .modal{padding:14px 12px;max-height:84vh}.modal h2{font-size:16px}
  .top-actions .icon{width:32px;height:32px}
}
@media(max-width:390px){
  .pricing.compact .price-grid{grid-template-columns:1fr}.pricing.compact .price-row{grid-template-columns:1fr auto}
  .brand{gap:6px}.stats{gap:4px}.stat{padding:5px 2px}.tabs button{font-size:12px}
}
</style>
</head>
<body>
<main class="app" id="app">
  <header class="topbar">
    <div class="brand"><div class="seal">雾</div><div><h1>雾都宾馆</h1><p>FOG CITY HOTEL · 1998</p></div></div>
    <div class="top-actions">
      <div class="datebox">任期第<b id="monthText">1</b>月<br>还剩<span id="leftText">24</span>个月</div>
      <button class="icon" id="resetBtn" title="重新开始" aria-label="重新开始">↻</button>
    </div>
  </header>
  <section class="stats" id="stats"></section>
  <section class="forecast" id="forecast"></section>
  <section class="pricing compact" id="pricing"></section>
  <section class="energy">
    <span class="energy-dots" id="energyDots">●●●●</span>
    <span class="hint">每月4点行动力，定价和查看报表不消耗行动力</span>
    <button class="primary" id="endMonthBtn">结束本月</button>
  </section>
  <section class="actions" id="actions"></section>
  <nav class="tabs" id="tabs">
    <button data-tab="operate" class="on">经营</button>
    <button data-tab="orders">订单</button>
    <button data-tab="team">团队</button>
    <button data-tab="relations">关系</button>
    <button data-tab="rank">排行</button>
    <button data-tab="log">日志</button>
  </nav>
  <section class="panel" id="panel"></section>
</main>
<div class="mask" id="mask"><div class="modal"><h2 id="modalTitle"></h2><div class="modal-body" id="modalBody"></div><div class="modal-options" id="modalOptions"></div></div></div>
<div class="ending" id="ending"><div class="end-card" id="endCard"></div></div>

function rolePower(s,dept){
  const d=s.departments[dept], m=managerFor(s,dept), sup=supervisorFor(s,dept);
  const staffRatio=clamp(d.staff/DEPARTMENTS[dept].need,.45,1.15);
  const leader=((m?m.skill*.09+m.manage*.07:.18)+(sup?sup.skill*.05+sup.manage*.04:.08));
  const vp=s.employees.filter(e=>postOf(e)?.rank===3).reduce((n,e)=>n+e.manage*.015,0);
  return clamp(staffRatio*(.48+leader+vp)*(0.72+s.morale/360),.25,1.35);
}

function orderTotals(s){

}
function calculateForecast(s){
  const season=seasonOf(s), sales=rolePower(s,"sales"), front=rolePower(s,"front"), rooms=rolePower(s,"rooms");
  const order=orderTotals(s), keys=Object.keys(ROOM_TYPES), roomRows=[];
  let sold=0, roomRevenue=0, capacity=0;
  for(const key of keys){
    const r=ROOM_TYPES[key], price=s.prices[key], elastic=key==="suite"?.72:1.08;
    const supportedRate=r.base*(1+.045*Math.max(0,(s.facilities.rooms||1)-1));
    const priceFactor=Math.pow(supportedRate/price,elastic);
    const typeBase=key==="standard"?.46:key==="business"?.39:.24;
    let occ=typeBase*season.factor*priceFactor*(.72+s.brand/180)*(.76+s.rating/13)*(.72+sales*.30);
    occ*=1+s.marketBoost+relationshipDemand(s);
    occ=clamp(occ,.08,.94);
    const nights=r.count*30, typeSold=nights*occ;
    sold+=typeSold;capacity+=nights;roomRevenue+=typeSold*price/10000;
    roomRows.push({key,name:r.name,count:r.count,price,occ,typeSold,revenue:typeSold*price/10000});
  }
  sold+=order.roomNights;roomRevenue+=order.roomRevenue;
  let occupancy=clamp(sold/capacity,0,1.12);
  const serviceCapacity=(front+rooms)/2;
  const overload=Math.max(0,occupancy-.82)+Math.max(0,order.load-rolePower(s,"fb")*1.35)*.08;
  const walkInFb=22+occupancy*26*rolePower(s,"fb");
  const fbRevenue=walkInFb+order.fbRevenue;
  const eventFacility=1+.06*Math.max(0,(s.facilities.banquet||1)-1)+.04*Math.max(0,(s.facilities.conference||1)-1);
  const eventRevenue=order.eventRevenue*eventFacility;
  const adr=sold>0?roomRevenue*10000/sold:0;
  const payroll=totalPayroll(s), utilities=14+occupancy*16+eventRevenue*.045;
  const procurement=fbRevenue*.36, ota=roomRevenue*s.otaShare*.15;
  const maintenance=5+s.facilityAge*1.2, debt=10, overtime=overload*38;
  const revenue=roomRevenue+fbRevenue+eventRevenue;
  const expense=payroll+utilities+procurement+ota+maintenance+debt+overtime;
  const cashNet=revenue-expense-order.delayed;
  return {season,roomRows,sold,capacity,occupancy,adr,revpar:adr*occupancy,roomRevenue,fbRevenue,eventRevenue,revenue,payroll,utilities,procurement,ota,maintenance,debt,overtime,expense,cashNet,overload,serviceCapacity,order};
}

function eventAvailable(e){return (!e.once||!S.usedEvents.includes(e.id))&&(!e.cond||e.cond())&&S.lastEvent!==e.id}
function chooseEvent(){
  const chained=S.chain.shift();if(chained){const e=EVENTS.find(x=>x.id===chained);if(e&&eventAvailable(e))return e}
  const pool=EVENTS.filter(eventAvailable);return pool.length?pick(pool):null;
}
function riskWarning(){
  const candidates=Object.keys(S.risks).filter(k=>S.risks[k]>=52&&(S.warningMonth[k]||0)<S.month-2);
  if(!candidates.length)return null;
  candidates.sort((a,b)=>S.risks[b]-S.risks[a]);
  if(Math.random()>.48&&S.risks[candidates[0]]<72)return null;
  return candidates[0];
}
function disasterCheck(){
  const candidates=Object.keys(S.risks).filter(k=>S.risks[k]>=85&&S.warnings[k]>=2);
  if(!candidates.length)return null;
  candidates.sort((a,b)=>S.risks[b]-S.risks[a]);const key=candidates[0];
  if(S.risks[key]<96&&Math.random()>.36)return null;
  const ends={
    fire:["火警封楼","凌晨四点，十二楼配电井起火。虽然人员最终疏散，但浓烟和消防水毁掉了三层客房。调查人员翻开一次次被推迟的整改记录，没人再问你这个月的入住率。"],
    hygiene:["食安事故","一场婚宴后，数十名客人出现食物中毒症状。急诊大厅挤满家属，雾都宾馆的名字登上了本地热搜第一。监管封停厨房，集团当天免去了你的职务。"],
    equipment:["设备事故","老旧电梯在运行中发生严重故障。救援结束后，整栋酒店被要求停业检查。那些交接本里反复出现的异常声音，最终都成了事故报告的附件。"],
    labor:["员工集体停工","婚宴旺季的早晨，客房和餐饮员工集体拒绝上岗。门口拉起了写着加班费和欠休的横幅，住客拖着行李穿过人群。集团派来的工作组接管了酒店。"],
    finance:["账本翻船","审计组从一张不连续的发票追到采购返点、账外宴请和长期挂账。你曾经认为可以以后再处理的每一笔小事，最后在一张表上连成了线。"],
  };
  return ends[key];
}
function applyPassiveRisks(s,f){
  const eng=rolePower(s,"engineering"),rooms=rolePower(s,"rooms"),fb=rolePower(s,"fb"),admin=rolePower(s,"admin");
  risk(s,"equipment",2.8+s.facilityAge*.5-eng*3.2+(f.occupancy>.9?3:0));
  risk(s,"fire",1.8+s.facilityAge*.35-eng*2.3+(f.eventRevenue>45?2:0));
  risk(s,"hygiene",2.2-rooms*1.4-fb*1.1+f.overload*8);
  const shortage=Object.entries(s.departments).reduce((n,[k,d])=>n+Math.max(0,DEPARTMENTS[k].need-d.staff),0);
  risk(s,"labor",1+shortage*.18+standby(s).length*.7-s.morale/55);
  risk(s,"finance",s.cash<80?5:s.cash<0?12:-1.2);
}
function settleCore(s){
  s.lastDelta={};const f=calculateForecast(s);
  add(s,"cash",f.cashNet);s.last={occupancy:f.occupancy,adr:f.adr,revpar:f.revpar,profit:f.cashNet,revenue:f.revenue};
  const service=(rolePower(s,"front")+rolePower(s,"rooms"))/2+s.serviceBoost;
  let ratingDelta=(service-.78)*.065-f.overload*.12;
  if(f.occupancy>.96)ratingDelta-=.035;
  add(s,"rating",ratingDelta);add(s,"brand",(s.rating-3.8)*.45+(f.cashNet>0?.3:-.2));
  const idle=standby(s).length;add(s,"morale",-1.5+Object.values(s.departments).reduce((n,d)=>n+(d.staff?0:.2),0)-idle*.65+(f.cashNet>15?.6:0));
  applyPassiveRisks(s,f);
  for(const n of s.npcs){if(n.fav>35&&n.lastMet<s.month)n.fav=clamp(n.fav-1,0,100)}
  for(const c of s.competitors){c.score=clamp(c.score+c.growth+rand(-.4,.5),35,98);if(Math.random()<.035){c.score-=5;log(s,"good",`${c.name}在网上出了状况，排名分下降。`)}}
  for(const o of s.orders.filter(x=>x.status==="accepted")){if(o.type==="婚宴")s.track.weddings++;if(["大型会议","年会","政府接待"].includes(o.type))s.track.meetings++;if(o.client)relation(s,o.client,2)}
  s.track.profit+=f.cashNet;s.track.revenue+=f.revenue;s.track.roomNights+=f.sold;s.track.maxOcc=Math.max(s.track.maxOcc,f.occupancy);s.track.minCash=Math.min(s.track.minCash,s.cash);
  s.marketBoost=0;s.serviceBoost=Math.max(0,s.serviceBoost-.04);s.facilityAge+=.055;
  const promised=Object.keys(s.flags).filter(k=>k.startsWith("promise_")&&s.flags[k]===s.month);
  for(const k of promised){const e=employeeById(s,+k.split("_")[1]);if(e){e.fav=clamp(e.fav-12,0,100);add(s,"morale",-3);log(s,"bad",`你答应${e.name}的提拔期限到了，岗位却没有动静。`)}}
  return f;
}

function hotelScore(s){
  const profitScore=clamp(50+(s.cash-(s.startCash||320))/12,10,95),ratingScore=clamp(s.rating*20,20,100),brand=s.brand;
  return round(profitScore*.38+ratingScore*.34+brand*.28,1);
}
function myRank(s){return 1+s.competitors.filter(c=>c.score>hotelScore(s)).length}

  if(s.flags.fiveStarBid&&s.rating>=4.45&&s.brand>=78&&profit>0)return ["五星挂牌","评审组离店那天没有表态。一个月后，红头文件送到酒店。雾都宾馆门口重新搭起脚手架，旧四星被摘下，新的五星在阳光下亮得晃眼。",true];
  if(s.track.weddings>=10&&s.track.weddings>s.track.meetings+2&&profit>80)return ["山城婚宴王","两年里，宴会厅见证了无数对新人。梁曼把下一年的黄金档期表推到你面前，已经排到十月。同行提起雾都宾馆，第一反应不再是老，而是难订。",true];
  if(s.track.meetings>=9&&s.last.adr>=430&&profit>70)return ["商务酒店之王","企业协议房和会展订单填满了工作日。大厅里永远有人拖着登机箱匆匆进出，雾都宾馆重新成了这座城市商务地图上的坐标。",true];
  if(s.rating>=4.6&&s.morale>=72)return ["服务传奇","你没有把所有钱都砸在大理石上，而是花在了人和流程上。两年后，平台评论里出现最多的一句话是：这家酒店的人，真的把客人当回事。",true];
  if(rank===1&&npcById(s,"shen").fav>=65)return ["集团晋升","董事会上，沈敬山把雾都宾馆两年的报表放到桌面正中。散会后程雪岚告诉你，集团运营副总的办公室已经收拾出来了。",true];
  if(s.morale>=82&&s.employees.filter(e=>e.fav>=65).length>=8)return ["员工拥戴","集团给了你新的任命，但离店那天，大堂、厨房、机房和客房部的人都来了。有人说这两年很累，但至少大家知道为什么而忙。",true];
  if(profit<0&&s.cash<80)return ["资本接盘","雾都宾馆没有倒下，但也没能真正翻身。集团最终把物业和经营权一起卖给了外地基金。新招牌挂起那天，你已经坐在另一座城市的酒店大堂里。",false];
  if(rank<=2)return ["老店新生","没有传奇般的五星，也没有惊天动地的逆袭。可两年前那家暮气沉沉的老酒店，如今现金流稳定、客人重新回来、员工愿意留下。这个结果足够硬。",true];
  return ["平稳守成","二十四个月结束，雾都宾馆仍站在原来的街口。成绩不算耀眼，问题也没有全部解决。沈敬山合上报表：『再给你一年，你还敢接吗？』",rank<=3];
}

function showModal(title,body,options){

function interactNpc(id,method){
  if(!needEnergy())return;const n=npcById(S,id);if(n.lastMet===S.month){showModal("本月已经见过",`${n.name}这个月已经见过，再去只会显得没有分寸。`,[{text:"知道了"}]);return}
  const costs={report:0,dinner:5,help:12};if(S.cash<costs[method]){showModal("现金不够","这次安排需要更多现金。",[{text:"知道了"}]);return}
  let delta=method===n.pref?8:method===n.avoid?-4:4;
  if(n.lastMethod===method){n.repeat=(n.repeat||0)+1;delta=Math.max(1,delta-n.repeat*2)}else n.repeat=0;
  n.lastMethod=method;n.lastMet=S.month;n.tried[method]=delta;add(S,"cash",-costs[method]);relation(S,id,delta);S.track.relations++;
  if(method==="help"&&["qin","luo","ma","shen"].includes(id)){risk(S,"finance",5);S.track.gray++}
  const scene=delta>=7?"这次你说到了对方心里，谈话结束时，对方主动提到了下一步合作。":delta<0?"对方礼貌地把话题岔开。你意识到，这种方式在他这里并不受用。":"事情谈得不坏，但还远不到可以开口提要求的时候。";
  log(S,delta>0?"good":"bad",`${n.name}好感${delta>=0?"+":""}${delta}。`);spend();showModal(`${n.name} · ${method==="report"?"正式拜访":method==="dinner"?"私下用餐":"帮忙办事"}`,`${scene}\n\n好感${delta>=0?"+":""}${delta}${costs[method]?`，花${costs[method]}万`:""}。`,[{text:"告辞"}]);
}

function doEndMonth(){
  const f=settleCore(S);const tasks=[];
  tasks.push(()=>showReport(f));
  const disaster=disasterCheck();if(disaster){tasks.push(()=>showEnd(disaster[0],disaster[1],false));queueAll(tasks);return}
  const warning=riskWarning();
  if(warning){const w=RISK_WARNINGS[warning];S.warningMonth[warning]=S.month;S.warnings[warning]++;
    tasks.push(()=>showModal(w.title,w.body,[eventOption(w.fix,`花${w.fixCost}万`,()=>{add(S,"cash",-w.fixCost);risk(S,warning,w.fixDelta);S.track.repairs++;log(S,"good",`${RISK_NAMES[warning]}方面做了一次针对性整改。`)},S.cash<w.fixCost),eventOption(w.ignore,"暂时不影响经营",()=>{risk(S,warning,w.ignoreDelta);log(S,"bad",`${w.title}的问题被暂时搁置。`)})]));
  }else{const e=chooseEvent();if(e){S.lastEvent=e.id;if(e.once)S.usedEvents.push(e.id);tasks.push(()=>showModal(`事件 · ${e.title}`,e.body,e.opts()))}}
  if(S.month%3===0)tasks.push(()=>quarterReview());
  if(S.flags.starTeam&&S.month>=11&&!S.flags.starDone)tasks.push(()=>starResult());
  if(S.flags.auditDanger&&S.risks.finance>=92)tasks.push(()=>showEnd("审计风暴","审计组没有离开。他们从异常合同继续追查，最终把采购返点和账外接待串在了一起。集团在通报发出前免去了你的职务。",false));
  if(S.cash<-80)tasks.push(()=>showEnd("资金链断裂","供应商停止送货，工资也已经拖欠。旋转门还在转，但酒店实际上已经停摆。集团工作组进驻后，你交出了总经理办公室的钥匙。",false));
  else if(S.morale<=8)tasks.push(()=>showEnd("人心散尽","前厅、客房和餐饮连续出现集体请假。酒店还有房、有宴会厅，却已经没有足够的人让它正常运转。",false));
  if(S.month>=24)tasks.push(()=>{const e=endingFor(S);showEnd(e[0],e[1],e[2])});
  else tasks.push(()=>nextMonth());
  queueAll(tasks);
}

];
function renderStats(){
  const el=$("#stats");el.innerHTML="";for(const d of STAT_DEFS){const div=document.createElement("div");div.className="stat";const delta=S.lastDelta[d.key]||0;div.innerHTML=`<div class="label">${d.name}</div><div class="value">${d.get(S)}<small>${d.unit}</small></div><div class="delta ${delta>0?"up":delta<0?"down":""}">${delta?(delta>0?"+":"")+round(delta,d.key==="rating"?2:0):""}</div><div class="tip">${d.tip}</div>`;div.onclick=e=>{const was=div.classList.contains("tip-on");document.querySelectorAll(".stat.tip-on").forEach(x=>x.classList.remove("tip-on"));if(!was)div.classList.add("tip-on");e.stopPropagation()};el.appendChild(div)}
}
function renderForecast(){
  const f=calculateForecast(S),accepted=S.orders.filter(o=>o.status==="accepted").length;$("#forecast").innerHTML=`<span>${f.season.name}</span><span>预计入住 <b>${Math.round(f.occupancy*100)}%</b></span><span>RevPAR <b>¥${Math.round(f.revpar)}</b></span><span>营收 <b>+${Math.round(f.revenue)}万</b></span><span>成本 <b>-${Math.round(f.expense)}万</b></span><span>现金净 <b class="${f.cashNet>=0?"up":"down"}">${f.cashNet>=0?"+":""}${Math.round(f.cashNet)}万</b></span>${accepted?`<span>已接 <b>${accepted}</b> 单</span>`:""}${f.overload>.08?`<span class="warning">服务负荷偏高</span>`:""}`;
}
function renderPricing(){
  const el=$("#pricing");el.innerHTML=`<div class="section-head"><h2>本月房价</h2><span>调整不消耗行动力</span></div><div class="price-grid">${Object.entries(ROOM_TYPES).map(([key,r])=>`<div class="price-row"><div><div class="name">${r.name} · ${r.count}间</div><div class="price">¥${S.prices[key]}</div></div><div class="stepper"><button onclick="adjustPrice('${key}',-1)" title="降价" aria-label="${r.name}降价">−</button><button onclick="adjustPrice('${key}',1)" title="涨价" aria-label="${r.name}涨价">+</button></div></div>`).join("")}</div>`;
}
const ACTIONS=[
  {glyph:"▥",name:"拓客户",desc:"协议/团队/婚宴",fn:actMarket},{glyph:"◉",name:"走关系",desc:"12位关键人物",fn:actRelation},
  {glyph:"♟",name:"管团队",desc:"岗位/招聘/基层",fn:actTeam},{glyph:"★",name:"抓服务",desc:"查房/培训/投诉",fn:actService},
  {glyph:"⚒",name:"修设施",desc:"检修/翻新",fn:actFacility},{glyph:"⌁",name:"做推广",desc:"平台/广告/房券",fn:actPromotion},
];
function renderActions(){const el=$("#actions");el.innerHTML="";ACTIONS.forEach(a=>{const d=document.createElement("div");d.className=`action${S.energy<=0?" off":""}`;d.innerHTML=`<div class="glyph">${a.glyph}</div><div class="name">${a.name}</div><div class="desc">${a.desc}</div>`;d.onclick=a.fn;el.appendChild(d)})}
function renderOperate(){
  const f=calculateForecast(S),deptRows=Object.entries(DEPARTMENTS).map(([id,d])=>{const p=rolePower(S,id),level=p>=.95?"运转顺畅":p>=.72?"勉强够用":"明显吃紧";return `<div class="card"><div class="row"><div><h3>${d.name}</h3><span class="pill ${p>=.95?"green":p<.72?"red":"gold"}">${level}</span></div><div class="number">基层 <b>${S.departments[id].staff}/${d.need}</b></div></div><div class="copy">经理：${managerFor(S,id)?.name||"空缺"} · 主管：${supervisorFor(S,id)?.name||"空缺"}</div><div class="progress"><i style="width:${Math.min(100,p*85)}%;background:${p<.72?"var(--red)":p>=.95?"var(--green)":"var(--blue)"}"></i></div></div>`}).join("");
  $("#panel").innerHTML=`<div class="metric-grid"><div class="metric"><div class="v">¥${Math.round(f.revpar)}</div><div class="k">预计RevPAR</div></div><div class="metric"><div class="v">${Math.round(f.revenue)}万</div><div class="k">预计总营收</div></div><div class="metric"><div class="v ${f.cashNet>=0?"up":"down"}">${f.cashNet>=0?"+":""}${Math.round(f.cashNet)}万</div><div class="k">预计现金净额</div></div></div><table class="room-table"><tr><th>房型</th><th>房量</th><th>定价</th><th>预计入住</th><th>预计收入</th></tr>${f.roomRows.map(r=>`<tr><td>${r.name}</td><td>${r.count}</td><td>¥${r.price}</td><td>${Math.round(r.occ*100)}%</td><td>${round(r.revenue,1)}万</td></tr>`).join("")}</table><div style="height:9px"></div>${deptRows}`;
}
function renderOrders(){
  const f=calculateForecast(S);$("#panel").innerHTML=`<div class="section-head"><h2>本月订单池</h2><span>接受订单不花行动力，谈判花1点</span></div><div class="forecast"><span>接单后预计入住 <b>${Math.round(f.occupancy*100)}%</b></span><span>宴会会议收入 <b>${Math.round(f.eventRevenue)}万</b></span>${f.overload>.08?'<span class="warning">当前组合可能超载</span>':""}</div>${S.orders.map(o=>`<div class="card order-card ${o.status}"><div class="row"><div><span class="order-type">${o.type}</span><h3 style="display:block">${o.title}</h3></div><span class="pill ${o.status==="accepted"?"green":o.status==="rejected"?"red":"blue"}">${o.status==="accepted"?"已接受":o.status==="rejected"?"已放弃":"待决定"}</span></div><div class="copy">${o.desc}</div><div class="copy">间夜 ${o.roomNights||0} · 客房${round(o.roomRevenue||0,1)}万 · 餐饮会议${round((o.fbRevenue||0)+(o.eventRevenue||0),1)}万${o.delayed?` · 延后回款${o.delayed}万`:""}</div>${o.status==="open"?`<div class="card-actions"><button class="small" onclick="acceptOrder('${o.id}')">接受</button><button class="small" onclick="negotiateOrder('${o.id}')">谈条件</button><button class="small" onclick="rejectOrder('${o.id}')">放弃</button></div>`:""}</div>`).join("")}`;
}
function renderTeam(){
  const filters=["all",...Object.keys(DEPARTMENTS),"standby","vacancy"];const labels={all:"全部",standby:"待岗",vacancy:"空缺",...Object.fromEntries(Object.entries(DEPARTMENTS).map(([k,d])=>[k,d.short]))};
  let html=`<div class="subnav">${filters.map(k=>`<button class="${S.teamFilter===k?"on":""}" onclick="setTeamFilter('${k}')">${labels[k]}</button>`).join("")}</div><div class="forecast"><span>实名管理层 <b>${S.employees.length}</b>人</span><span>待岗 <b class="${standby(S).length?"down":"up"}">${standby(S).length}</b>人</span><span>基层 <b>${totalFrontline(S)}</b>人</span><span>月工资 <b>${totalPayroll(S)}万</b></span></div>`;
  if(S.teamFilter==="vacancy"){
    const v=POSTS.filter(p=>vacancy(S,p.id));html+=v.length?v.map(p=>`<div class="card vacancy"><div class="row"><div><h3>${p.name}</h3><span class="pill red">空缺</span></div><span class="meta">编制等级 ${p.rank}</span></div><div class="copy">需要从合适的下级岗位提拔，或安排一名符合专业要求的待岗人员。</div></div>`).join(""):`<div class="empty-state">当前没有空缺岗位</div>`;
  }else{
    const list=S.employees.filter(e=>S.teamFilter==="all"||(S.teamFilter==="standby"&&!e.post)||e.dept===S.teamFilter);
    html+=list.length?list.map(e=>{const p=postOf(e);return `<div class="card"><div class="person-head"><div class="avatar">${e.name.slice(-1)}</div><div class="person-main"><div class="row"><div><h3>${e.name}</h3><span class="pill ${p?"blue":"red"}">${p?p.name:"待岗"}</span><span class="pill">${e.faction}</span></div><div class="number">月薪 <b>${e.salary}万</b></div></div><div class="attrs"><span class="attr">专业 ${e.skill}</span><span class="attr">管理 ${e.manage}</span><span class="attr">忠诚 ${e.loyalty}</span><span class="attr">好感 ${e.fav}</span></div><div class="copy">${e.trait}</div><div class="card-actions">${!p?`<button class="small" onclick="chooseAssignment(${e.id})">安排上岗</button>`:""}${p&&p.rank<3?`<button class="small" onclick="promoteEmployee(${e.id})">提拔</button>`:""}${p?`<button class="small" onclick="demoteEmployee(${e.id})">降职</button>`:""}<button class="small danger" onclick="dismissEmployee(${e.id})">解聘</button></div></div></div></div>`}).join(""):`<div class="empty-state">这个分类里没有员工</div>`;
  }
  $("#panel").innerHTML=html;
}
function renderRelations(){
  const filters=["all","集团","外部","渠道","客户","内部"];let html=`<div class="subnav">${filters.map(k=>`<button class="${S.relationFilter===k?"on":""}" onclick="setRelationFilter('${k}')">${k==="all"?"全部":k}</button>`).join("")}</div><div class="forecast"><span>同一种方式反复使用，效果会递减</span><span>每人每月只能见一次</span></div>`;
  const mark=v=>v===undefined?"":v>=7?" ✓":v<0?" ×":" ·";
  html+=S.npcs.filter(n=>S.relationFilter==="all"||n.group===S.relationFilter).map(n=>`<div class="card"><div class="person-head"><div class="avatar">${n.name.slice(-1)}</div><div class="person-main"><div class="row"><div><h3>${n.name}</h3><span class="pill">${n.group}</span></div><div class="number">好感 <b>${n.fav}</b></div></div><div class="meta">${n.title}</div><div class="progress"><i style="width:${n.fav}%;background:${n.fav>=60?"var(--green)":"var(--blue)"}"></i></div><div class="copy">${n.hint}</div><div class="copy ${n.fav>=60?"up":""}">${n.fav>=60?"已建立稳定关系：":"好感60解锁："}${n.perk}</div><div class="card-actions"><button class="small" ${n.lastMet===S.month||S.energy<=0?"disabled":""} onclick="interactNpc('${n.id}','report')">正式拜访${mark(n.tried.report)}</button><button class="small" ${n.lastMet===S.month||S.energy<=0?"disabled":""} onclick="interactNpc('${n.id}','dinner')">私下用餐 5万${mark(n.tried.dinner)}</button><button class="small" ${n.lastMet===S.month||S.energy<=0?"disabled":""} onclick="interactNpc('${n.id}','help')">帮忙办事 12万${mark(n.tried.help)}</button></div></div></div></div>`).join("");$("#panel").innerHTML=html;
}
function renderRank(){
  const rows=S.competitors.map(c=>({name:c.name,manager:c.manager,style:c.style,score:c.score,adr:c.adr,me:false}));rows.push({name:"雾都宾馆",manager:S.playerName,style:"看你的",score:hotelScore(S),adr:S.last.adr,me:true});rows.sort((a,b)=>b.score-a.score);
  $("#panel").innerHTML=`<table class="rank-table"><tr><th>#</th><th>酒店</th><th>负责人</th><th>路线</th><th>综合分</th></tr>${rows.map((r,i)=>`<tr class="${r.me?"me":""}"><td>${i+1}</td><td>${escapeHtml(r.name)}</td><td>${escapeHtml(r.manager)}</td><td>${r.style}</td><td>${round(r.score,1)}</td></tr>`).join("")}</table><div class="copy" style="margin-top:8px">综合分由累计利润、网络评分和品牌共同构成。竞争酒店会成长，也可能因自己的经营路线爆雷。</div>`;
}
function renderLog(){$("#panel").innerHTML=`<div class="log">${S.log.map(l=>`<p class="${l.cls||""}">${l.text}</p>`).join("")}</div>`}
function renderPanel(){if(S.tab==="operate")renderOperate();if(S.tab==="orders")renderOrders();if(S.tab==="team")renderTeam();if(S.tab==="relations")renderRelations();if(S.tab==="rank")renderRank();if(S.tab==="log")renderLog()}
function switchTab(tab){S.tab=tab;document.querySelectorAll("#tabs button").forEach(b=>b.classList.toggle("on",b.dataset.tab===tab));renderPanel();save()}
function setTeamFilter(v){S.teamFilter=v;renderTeam()}
function setRelationFilter(v){S.relationFilter=v;renderRelations()}
function renderAll(){if(typeof document==="undefined")return;$("#monthText").textContent=S.month;$("#leftText").textContent=Math.max(0,25-S.month);$("#energyDots").textContent="●".repeat(S.energy)+"○".repeat(4-S.energy);renderStats();renderForecast();renderPricing();renderActions();document.querySelectorAll("#tabs button").forEach(b=>b.classList.toggle("on",b.dataset.tab===S.tab));renderPanel();save()}
function save(){if(!S)return;try{localStorage.setItem(SAVE_KEY,JSON.stringify(S))}catch(e){}}
function load(){try{const raw=localStorage.getItem(SAVE_KEY);if(!raw)return false;const data=JSON.parse(raw);if(data.version!==SAVE_VERSION)return false;S=data;return true}catch(e){return false}}
function askName(){
  $("#modalTitle").textContent="集团任命";$("#modalBody").innerHTML=`程雪岚把任命文件推到你面前：『雾都宾馆交给你，两年。先在这里签字。』<br><br><input id="nameInput" maxlength="8" placeholder="写下你的名字">`;const box=$("#modalOptions");box.innerHTML="";const b=document.createElement("button");b.className="primary";b.textContent="签字上任";b.onclick=()=>{S.playerName=$("#nameInput").value.trim()||"无名总经理";$("#mask").classList.remove("show");showIntro()};box.appendChild(b);$("#mask").classList.add("show");setTimeout(()=>$("#nameInput")?.focus(),50);
}
function showIntro(){showModal("空降第一天",`雾都宾馆，126间客房，两座宴会厅，四个会议室。\n\n你能看到现金、入住率、房价、评分、士气和排名；看不到的东西更多。老设备不会自己开口，员工的不满也不会变成数字挂在墙上。\n\n每月4点行动力。先定房价，再决定接哪些订单、见哪些人、把钱和时间花在哪里。月底，酒店会把答案写进账单和评论里。`,[{text:"开门营业"}])}
function restartGame(){try{localStorage.removeItem(SAVE_KEY)}catch(e){}S=initialState();$("#ending").classList.remove("show");renderAll();askName()}
function requestRestart(){showModal("重新开始",`确定放弃当前第${S.month}月的进度，重新接手雾都宾馆？`,[eventOption("确认重开","当前存档会被覆盖",()=>restartGame()),eventOption("取消","",()=>{})])}
function init(){
  if(!load()){S=initialState();renderAll();askName()}else{renderAll();if(S.over&&S.endData)setTimeout(()=>showEnd(S.endData.title,S.endData.story,S.endData.good),0)}
  $("#endMonthBtn").onclick=endMonth;$("#resetBtn").onclick=requestRestart;document.querySelectorAll("#tabs button").forEach(b=>b.onclick=()=>switchTab(b.dataset.tab));document.addEventListener("click",()=>document.querySelectorAll(".stat.tip-on").forEach(x=>x.classList.remove("tip-on")));
}

const API={initialState,calculateForecast,settleCore,hotelScore,myRank,endingFor,getEventCount:()=>EVENTS.length,getRiskWarningCount:()=>Object.keys(RISK_WARNINGS).length,setState:s=>S=s,getState:()=>S};
if(typeof window!=="undefined")window.HotelGame=API;else globalThis.HotelGame=API;
Object.assign(globalThis,{adjustPrice,acceptOrder,rejectOrder,negotiateOrder,interactNpc,chooseAssignment,promoteEmployee,demoteEmployee,dismissEmployee,setTeamFilter,setRelationFilter,restartGame});
if(typeof document!=="undefined")init();
</script>
</body>
</html>
